<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>どうぶつじゃんけん</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #FF8C7A;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', sans-serif;
      }

      .container {
        background: #fff;
        border-radius: 24px;
        padding: 28px 32px;
        max-width: 680px;
        width: 100%;
        text-align: center;
      }

      .page-title { font-size: 22px; color: #d95c5c; margin-bottom: 4px; }
      .page-description { font-size: 13px; color: #f0a090; margin-bottom: 20px; }

      .main-row { display: flex; align-items: center; gap: 16px; }

      .battle-area { display: flex; align-items: center; gap: 10px; flex: 1; }

      .character-box {
        background: #fff5f3;
        border: 2px solid #f7ccc4;
        border-radius: 16px;
        width: 120px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .char-emoji { margin: 8px 0; line-height: 1; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .cpu-face   { font-size: 36px; line-height: 1; display: block; }
      .cpu-hand   { font-size: 40px; line-height: 1; display: block; margin-top: 4px; }
      .char-name  { font-size: 12px; color: #d95c5c; font-weight: bold; }
      .hand-label { font-size: 11px; color: #f0a090; min-height: 16px; }
      .vs-text    { font-size: 20px; font-weight: 900; color: #FF8C7A; flex-shrink: 0; }

      .control-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        min-width: 200px;
      }

      .score-row { display: flex; gap: 10px; }

      .score-box {
        background: #fff5f3;
        border: 2px solid #f7ccc4;
        border-radius: 12px;
        padding: 8px 14px;
        font-size: 13px;
        color: #d95c5c;
        font-weight: bold;
        min-width: 80px;
      }

      .score-box span { font-size: 26px; display: block; line-height: 1.2; }

      .choose-label { font-size: 13px; color: #d95c5c; font-weight: bold; }

      .hand-buttons { display: flex; gap: 8px; }

      .hand-btn {
        background: #fff5f3;
        border: 2px solid #f7ccc4;
        border-radius: 14px;
        width: 62px;
        height: 62px;
        font-size: 22px;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        line-height: 1;
      }

      .hand-btn .btn-label { font-size: 10px; color: #d95c5c; font-weight: bold; }
      .hand-btn:hover { background: #ffe0da; border-color: #f09080; }
      .hand-btn:active { transform: scale(0.95); }

      .reset-btn {
        border: 2px dashed #f7ccc4;
        background: none;
        color: #f0a090;
        border-radius: 10px;
        padding: 5px 16px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
      }

      .reset-btn:hover { background: #fff5f3; }

      .result-text {
        font-size: 22px;
        font-weight: bold;
        margin-top: 16px;
        min-height: 36px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="page-title">🐱 どうぶつじゃんけん 🐰</h1>
      <p class="page-description">ねこちゃんとじゃんけんしよう！</p>

      <div class="main-row">

        <!-- 左：VSエリア -->
        <div class="battle-area">
          <div class="character-box">
            <span class="char-name">きみ</span>
            <p class="char-emoji" id="you-emoji">
              <span class="cpu-face" id="you-face">👦</span>
              <span class="cpu-hand" id="you-hand">❓</span>
            </p>
            <p class="hand-label" id="you-label"></p>
          </div>
          <div class="vs-text">VS</div>
          <div class="character-box">
            <span class="char-name">ねこ</span>
            <p class="char-emoji" id="cpu-emoji">
              <span class="cpu-face" id="cpu-face">😺</span>
              <span class="cpu-hand" id="cpu-hand">❓</span>
            </p>
            <p class="hand-label" id="cpu-label"></p>
          </div>
        </div>

        <!-- 右：スコア＋ボタン -->
        <div class="control-area">
          <div class="score-row">
            <div class="score-box">きみ<span id="score-you">0</span></div>
            <div class="score-box">ねこ<span id="score-cpu">0</span></div>
          </div>
          <p class="choose-label">どれにする？</p>
          <div class="hand-buttons">
            <button class="hand-btn" data-hand="rock">
              <span>✊</span><span class="btn-label">グー</span>
            </button>
            <button class="hand-btn" data-hand="scissors">
              <span>✌️</span><span class="btn-label">チョキ</span>
            </button>
            <button class="hand-btn" data-hand="paper">
              <span>🖐️</span><span class="btn-label">パー</span>
            </button>
          </div>
          <button class="reset-btn" id="reset-btn">🔄 リセット</button>
        </div>

      </div>

      <!-- 結果表示 -->
      <p class="result-text" id="result-text"></p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      const hands = ['rock', 'scissors', 'paper'];
      const emoji = { rock: '✊', scissors: '✌️', paper: '🖐️' };
      const label = { rock: 'グー', scissors: 'チョキ', paper: 'パー' };
      let scoreYou = 0, scoreCpu = 0;

      $('.hand-btn').on('click', function () {
        const you = $(this).data('hand');
        const cpu = hands[Math.floor(Math.random() * 3)];

        // 音声
        speak('じゃんけん');
        setTimeout(() => speak('ぽん'), 700);

        // 表示更新
        $('#you-face').text('👦');
        $('#you-hand').text(emoji[you]);
        $('#cpu-face').text(emoji[cpu]);
        $('#cpu-hand').text('');
        $('#you-label').text(label[you]);
        $('#cpu-label').text(label[cpu]);

        // 判定
        const result = judge(you, cpu);
        if (result === 'win') {
          scoreYou++;
          $('#score-you').text(scoreYou);
          $('#result-text').text('🎉 かった！').css('color', '#e07800');
          $('#cpu-face').text('🙀');
          $('#cpu-hand').text(emoji[cpu]);
        } else if (result === 'lose') {
          scoreCpu++;
          $('#score-cpu').text(scoreCpu);
          $('#result-text').text('😢 まけた…').css('color', '#e91e63');
          $('#cpu-face').text('😼');
          $('#cpu-hand').text(emoji[cpu]);
        } else {
          $('#result-text').text('🤝 あいこ！').css('color', '#388e3c');
          $('#cpu-face').text('😸');
          $('#cpu-hand').text(emoji[cpu]);
        }
      });

      $('#reset-btn').on('click', function () {
        scoreYou = 0; scoreCpu = 0;
        $('#score-you, #score-cpu').text(0);
        $('#you-face').text('👦');
        $('#you-hand').text('❓');
        $('#cpu-face').text('😺');
        $('#cpu-hand').text('');
        $('#you-label, #cpu-label').text('');
        $('#result-text').text('').css('color', '');
      });

      function judge(you, cpu) {
        if (you === cpu) return 'draw';
        if (
          (you === 'rock'     && cpu === 'scissors') ||
          (you === 'scissors' && cpu === 'paper')    ||
          (you === 'paper'    && cpu === 'rock')
        ) return 'win';
        return 'lose';
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ja-JP';
        utt.pitch = 1.3;
        utt.rate = 0.85;
        window.speechSynthesis.speak(utt);
      }
    </script>
  </body>
</html>
